name: Daily PIB News Digest

on:
  schedule:
    # 07:30 AM IST every day (IST = UTC+5:30, so 02:00 UTC)
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      include_all_dates:
        description: "Include all dates (useful for testing when today's releases are 0)"
        type: boolean
        required: false
        default: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest script
        run: |
          if [ -n "$PIB_ENV" ]; then
            echo "$PIB_ENV" > .env
          fi
          
          ARGS=""
          if [ "${{ github.event.inputs.include_all_dates }}" = "true" ]; then
            ARGS="--include-all-dates"
          fi
          
          python main.py $ARGS
        env:
          PIB_ENV: ${{ secrets.PIB_ENV }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO || 'abhinaykumar5432@gmail.com' }}
