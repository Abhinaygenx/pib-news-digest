name: Daily PIB News Digest

on:
  schedule:
    # 07:30 AM IST every day (IST = UTC+5:30, so 02:00 UTC)
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      include_all_dates:
        description: "Include all dates (useful for testing when today's releases are 0)"
        type: boolean
        required: false
        default: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env from PIB_ENV secret
        # PIB_ENV should contain all config lines, e.g.:
        #   SMTP_HOST=smtp.gmail.com
        #   SMTP_PORT=587
        #   SMTP_USER=you@gmail.com
        #   SMTP_PASS=xxxxxxxxxxxxxxxx
        #   EMAIL_FROM=you@gmail.com
        #   EMAIL_TO=you@gmail.com
        run: |
          if [ -n "$PIB_ENV" ]; then
            printf '%s\n' "$PIB_ENV" > .env
            echo "[setup] .env written ($(wc -l < .env) lines)"
            echo "[setup] Keys found in .env: $(grep -oP '^[A-Z_]+(?==)' .env | tr '\n' ' ')"
          else
            echo "[setup] WARNING: PIB_ENV secret is not set. Email will fail."
          fi
        env:
          PIB_ENV: ${{ secrets.PIB_ENV }}

      - name: Run digest script
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.include_all_dates }}" = "true" ]; then
            ARGS="--include-all-dates"
          fi
          python main.py $ARGS
        env:
          EMAIL_TO: ${{ secrets.EMAIL_TO || 'abhinaykumar5432@gmail.com' }}
